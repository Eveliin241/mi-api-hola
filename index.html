<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botánica OS | Elite System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sidebar-bg: #1a3c34; 
            --main-bg: #f4f1de;    
            --accent-lavender: #6d597a;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--main-bg); overflow: hidden; }

        /* --- PORTADA (TAL CUAL LA TIENES) --- */
        #portada {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(26,60,52,0.6), rgba(26,60,52,0.8)), 
                        url('https://images.unsplash.com/photo-1596003906949-67221c37965c?auto=format&fit=crop&w=1200&q=80');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
            transition: transform 0.8s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .hero-text { font-size: 4rem; letter-spacing: 10px; color: white; margin: 0; font-weight: 300; }
        .btn-entrar { margin-top:30px; padding:15px 50px; border-radius:50px; border:none; cursor:pointer; font-weight:bold; background: white; color: var(--sidebar-bg); }

        /* --- BOTÓN DE BARRAS (LA MEJORA) --- */
        #menu-toggle {
            position: fixed; top: 20px; left: 20px; z-index: 1100;
            background: var(--sidebar-bg); color: white; border: none;
            width: 45px; height: 45px; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        #app-wrapper { display: flex; width: 100vw; height: 100vh; }

        /* --- NAVEGACIÓN (COLAPSABLE) --- */
        nav { 
            width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; 
            padding: 80px 0 40px; color: white; flex-shrink: 0;
            transition: all 0.4s ease;
        }
        
        /* Cuando el menú está cerrado */
        nav.collapsed { width: 0; overflow: hidden; opacity: 0; pointer-events: none; }

        .nav-item { padding: 18px 25px; cursor: pointer; opacity: 0.6; display: flex; align-items: center; gap: 15px; transition: 0.3s; white-space: nowrap; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent-lavender); }

        /* --- CONTENIDO --- */
        main { flex-grow: 1; padding: 80px 40px 40px; overflow-y: auto; box-sizing: border-box; }
        
        .glass-panel { background: white; border-radius: 30px; padding: 35px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        h2 { font-weight: 400; color: #1a3c34; margin-bottom: 20px; }

        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #eee; background: #fafafa; font-family: inherit; box-sizing: border-box; }
        .btn-pro { background: #1a3c34; color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 10px; }

        /* MÓVIL */
        @media (max-width: 768px) {
            nav { position: fixed; left: -260px; height: 100%; z-index: 1050; }
            nav.open { left: 0; opacity: 1; }
            main { padding: 80px 20px 20px; }
        }
    </style>
</head>
<body>

    <div id="portada">
        <h1 class="hero-text">BOTÁNICA</h1>
        <button class="btn-entrar" onclick="iniciarApp()">ENTRAR A BITÁCORA</button>
    </div>

    <button id="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>

    <div id="app-wrapper">
        <nav id="sidebar">
            <div class="nav-item active" onclick="showSection('reg-user', this)"><i class="fas fa-user"></i> PERSONA A CARGO</div>
            <div class="nav-item" onclick="showSection('reg-obs', this)"><i class="fas fa-plus-circle"></i> NUEVO REGISTRO</div>
            <div class="nav-item" onclick="showSection('view-obs', this)"><i class="fas fa-list"></i> HISTORIAL</div>
        </nav>

        <main>
            <div id="reg-user" class="view-section active">
                <div class="glass-panel">
                    <h2>Persona a Cargo</h2>
                    <input type="text" id="reg_nombre" placeholder="Nombre completo...">
                    <button class="btn-pro" onclick="registrarUser()">DAR DE ALTA</button>
                </div>
            </div>

            <div id="reg-obs" class="view-section" style="display:none;">
                <div class="glass-panel">
                    <h2>Nuevo Registro de Campo</h2>
                    <select id="sel_usuario"></select>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="obs_altura" placeholder="Altura (cm)">
                        <select id="obs_estado"><option>Saludable</option><option>En Floración</option><option>Estrés</option></select>
                    </div>
                    <textarea id="obs_notas" rows="3" placeholder="Observaciones..."></textarea>
                    <button class="btn-pro" onclick="guardarObs()">GUARDAR REGISTRO</button>
                </div>
            </div>

            <div id="view-obs" class="view-section" style="display:none;">
                <h2>Historial de Campo</h2>
                <div id="grid-dinamico"></div>
            </div>
        </main>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    function iniciarApp() {
        document.getElementById('portada').style.transform = 'translateY(-100%)';
        actualizarDatos();
    }

    // FUNCIÓN PARA EL MENÚ DE BARRAS
    function toggleMenu() {
        const nav = document.getElementById('sidebar');
        if(window.innerWidth <= 768) {
            nav.classList.toggle('open');
        } else {
            nav.classList.toggle('collapsed');
        }
    }

    function showSection(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.style.display = 'none');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).style.display = 'block';
        if(el) el.classList.add('active');
        if(window.innerWidth <= 768) toggleMenu(); // Cerrar al elegir en móvil
    }

    async function actualizarDatos() {
        const [uRes, hRes] = await Promise.all([
            fetch(`${API}/lista-usuarios`),
            fetch(`${API}/lavandas_json`)
        ]);
        const usuarios = await uRes.json();
        const obs = await hRes.json();
        
        document.getElementById('sel_usuario').innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
        document.getElementById('grid-dinamico').innerHTML = obs.map(o => `
            <div class="glass-panel" style="padding:20px; margin-bottom:15px;">
                <strong style="color:var(--accent-lavender)">${o.nombre}</strong><br>
                <span>${o.altura_cm}cm - ${o.estado_salud}</span>
                <p style="margin:5px 0; font-style:italic;">"${o.observaciones}"</p>
            </div>
        `).join('');
    }

    async function registrarUser() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return;
        await fetch(`${API}/registrar`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ nombre }) });
        document.getElementById('reg_nombre').value = "";
        actualizarDatos();
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Registrado', showConfirmButton: false, timer: 1500 });
    }

    async function guardarObs() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };
        await fetch(`${API}/nueva-observacion`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        document.getElementById('obs_altura').value = "";
        document.getElementById('obs_notas').value = "";
        actualizarDatos();
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Guardado', showConfirmButton: false, timer: 1500 });
    }
</script>
</body>
</html>
