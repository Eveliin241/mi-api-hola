<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Salud & Lavanda | Elite System</title>
    <link rel="icon" href="https://fonts.gstatic.com/s/i/short-term/release/googlestylesheet/leaf/default/24px.svg">
    <style>
        :root { --grad: linear-gradient(135deg, #1b5e20 0%, #4a148c 100%); --glass: rgba(255, 255, 255, 0.1); }
        body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--grad); color: white; min-height: 100vh; overflow-x: hidden; }
        
        /* Pantalla de Portada */
        #portada { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; background: var(--grad); transition: 0.8s; }
        .btn-enter { padding: 15px 40px; border: 2px solid white; background: none; color: white; border-radius: 50px; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .btn-enter:hover { background: white; color: #4a148c; }

        /* Contenedor Principal */
        #app { display: none; padding: 20px; max-width: 900px; margin: auto; animation: fadeIn 1s; }
        .card { background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(10px); border-radius: 20px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        
        h2 { color: #b39ddb; border-left: 4px solid #81c784; padding-left: 15px; }
        input, select, textarea { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 12px; border-radius: 10px; width: 100%; margin: 10px 0; outline: none; }
        option { background: #4a148c; color: white; }
        
        .btn-save { background: #66bb6a; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        
        /* Historial Pro */
        .registro-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin: 10px 0; border-bottom: 3px solid #81c784; }
        
        /* Panel Oculto */
        #admin-panel { display: none; margin-top: 50px; background: rgba(255, 82, 82, 0.1); padding: 20px; border-radius: 20px; border: 1px dashed #ff5252; }
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.3; cursor: pointer; font-size: 0.7rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="portada">
        <h1 style="font-size: 4rem; margin: 0;">🌿</h1>
        <h1 style="letter-spacing: 5px;">SALUD & LAVANDA</h1>
        <p style="opacity: 0.8; margin-bottom: 30px;">Sistema de Inteligencia Vegetal y Monitoreo Escolar</p>
        <button class="btn-enter" onclick="entrar()">ACCEDER AL SISTEMA</button>
    </div>

    <div id="app">
        <div class="card">
            <h2>👤 Registro de Identidad</h2>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="reg_nombre" placeholder="Nombre del Investigador">
                <button class="btn-save" style="width: 200px;" onclick="registrar()">REGISTRAR</button>
            </div>
        </div>

        <div class="card">
            <h2>📝 Bitácora de Campo</h2>
            <label>Investigador:</label>
            <select id="sel_usuario"><option>Cargando...</option></select>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="obs_altura" placeholder="Altura (cm)">
                <select id="obs_estado">
                    <option>Saludable</option>
                    <option>Excelente</option>
                    <option>Estrés Hídrico</option>
                    <option>Plaga Detectada</option>
                </select>
            </div>
            <textarea id="obs_notas" rows="3" placeholder="Detalles de la observación..."></textarea>
            <button class="btn-save" style="background: #7e57c2;" onclick="subirNota()">GUARDAR EN NUBE</button>
        </div>

        <h2>📅 Registro Histórico</h2>
        <div id="historial"></div>

        <div id="admin-panel">
            <h3 style="color: #ff5252;">🛠️ Panel Maestro de Usuarios</h3>
            <div id="lista_admin"></div>
        </div>
    </div>

    <div class="admin-trigger" onclick="abrirAdmin()">Configuración Crítica</div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    function entrar() {
        document.getElementById('portada').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        cargarDatos();
    }

    async function cargarDatos() {
        const uRes = await fetch(`${API}/lista-usuarios`);
        const usuarios = await uRes.json();
        
        // Actualizar Selectores
        document.getElementById('sel_usuario').innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
        
        // Actualizar Lista Admin
        document.getElementById('lista_admin').innerHTML = usuarios.map(u => `
            <div style="display:flex; justify-content:space-between; margin:5px 0; background:rgba(255,255,255,0.1); padding:10px; border-radius:8px;">
                <span>${u.nombre}</span>
                <button onclick="borrarUsuario(${u.id})" style="background:#ff5252; color:white; border:none; border-radius:5px; cursor:pointer;">Eliminar</button>
            </div>
        `).join('');

        // Cargar Historial
        const hRes = await fetch(`${API}/lavandas_json`);
        const data = await hRes.json();
        document.getElementById('historial').innerHTML = data.map(l => `
            <div class="registro-item">
                <div style="display:flex; justify-content:space-between; color:#81c784; font-weight:bold;">
                    <span>👤 ${l.nombre}</span>
                    <span>📅 ${new Date(l.fecha).toLocaleDateString()}</span>
                </div>
                <div style="margin:10px 0;">📏 ${l.altura_cm}cm | ✨ ${l.estado_salud}</div>
                <div style="font-style:italic; opacity:0.8;">"${l.observaciones}"</div>
            </div>
        `).join('');
    }

    async function registrar() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return;
        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nombre})
        });
        document.getElementById('reg_nombre').value = "";
        alert("Investigador Autorizado");
        cargarDatos(); // Actualiza todo instantáneamente
    }

    async function subirNota() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };
        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        document.getElementById('obs_altura').value = "";
        document.getElementById('obs_notas').value = "";
        alert("Datos Sincronizados");
        cargarDatos();
    }

    function abrirAdmin() {
        const pass = prompt("Ingrese Clave Maestra:");
        if(pass === "osio2023") {
            document.getElementById('admin-panel').style.display = 'block';
            window.scrollTo(0, document.body.scrollHeight);
        } else {
            alert("Acceso Denegado");
        }
    }

    async function borrarUsuario(id) {
        if(confirm("¿Eliminar usuario y registros permanentemente?")) {
            await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' });
            cargarDatos();
        }
    }
</script>
</body>
</html>
