<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora | Salud & Lavanda</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌿</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --deep-green: #1a3c34;
            --muted-lavender: #6d597a;
            --cream: #f4f1de;
            --white: #ffffff;
        }

        body {
            margin: 0;
            background: var(--cream);
            color: #333;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Portada con Profundidad */
        #portada {
            height: 100vh;
            background: linear-gradient(rgba(26,60,52,0.7), rgba(26,60,52,0.85)), 
                        url('https://images.unsplash.com/photo-1596003906949-67221c37965c?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .title-container { animation: fadeInUp 1.5s; }

        .btn-lujo {
            padding: 20px 60px;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.5);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 40px;
            border-radius: 100px; /* Súper redondeado */
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 4px;
            backdrop-filter: blur(5px);
        }

        .btn-lujo:hover { 
            background: white; 
            color: var(--deep-green); 
            transform: scale(1.05);
            border-color: white;
        }

        /* Contenedor Flotante Orgánico */
        #app { 
            display: none; 
            padding: 60px 20px; 
            max-width: 900px; 
            margin: auto; 
        }

        .card {
            background: var(--white);
            padding: 45px;
            border-radius: 40px; /* Esquinas muy suaves */
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            border: none;
            position: relative;
            overflow: hidden;
        }

        /* Decoración interna de las cards */
        .card::before {
            content: "🌿";
            position: absolute;
            top: -20px;
            right: -10px;
            font-size: 80px;
            opacity: 0.05;
            transform: rotate(20deg);
        }

        h2 { 
            color: var(--deep-green); 
            font-weight: 300;
            font-size: 1.8rem;
            margin-bottom: 30px;
        }

        input, select, textarea {
            width: 100%;
            padding: 18px;
            margin: 10px 0 25px 0;
            background: #fdfdfd;
            border: 1px solid #e0e0e0;
            border-radius: 20px; /* Inputs suaves */
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--muted-lavender); box-shadow: 0 0 0 4px rgba(109, 89, 122, 0.1); }

        .btn-save {
            background: var(--deep-green);
            color: white;
            padding: 20px;
            width: 100%;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-save:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Lista de registros estilo "Burbuja" */
        .registro-card {
            background: white;
            padding: 25px;
            border-radius: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            transition: 0.3s;
        }

        .registro-card:hover { transform: scale(1.02); }

        /* Animaciones Personalizadas */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="portada">
        <div class="title-container">
            <h1 style="font-size: 4rem; font-weight: 100; letter-spacing: 10px; margin: 0;">BOTÁNICA</h1>
            <p style="font-size: 1.2rem; letter-spacing: 5px; opacity: 0.8;">INVESTIGACIÓN DE CAMPO</p>
        </div>
        <button class="btn-lujo" onclick="iniciar()">Explorar Bitácora</button>
    </div>

    <div id="app" class="animate__animated animate__fadeInUp">
        <div class="card">
            <h2>Persona a Cargo</h2>
            <input type="text" id="reg_nombre" placeholder="Nombre completo del investigador">
            <button class="btn-save" onclick="registrar()">DAR DE ALTA</button>
        </div>

        <div class="card">
            <h2>Nuevo Registro</h2>
            <label style="font-size: 0.8rem; margin-left: 10px; opacity: 0.6;">Seleccionar Investigador:</label>
            <select id="sel_usuario"><option>Cargando lista...</option></select>
            
            <div style="display: flex; gap: 20px;">
                <input type="number" id="obs_altura" placeholder="Altura (cm)" style="flex: 1;">
                <select id="obs_estado" style="flex: 1;">
                    <option>Saludable</option>
                    <option>En Floración</option>
                    <option>Estrés Hídrico</option>
                </select>
            </div>
            
            <textarea id="obs_notas" rows="4" placeholder="Observaciones detalladas sobre el follaje o entorno..."></textarea>
            <button class="btn-save" style="background: var(--muted-lavender);" onclick="guardar()">SUBIR A NUBE</button>
        </div>

        <div id="historial"></div>

        <div style="text-align: center; margin-top: 80px; padding-bottom: 40px;">
            <span style="opacity: 0.3; cursor: pointer; font-size: 0.8rem;" onclick="abrirAdmin()">Sistema v3.0</span>
        </div>

        <div id="admin-panel" style="display:none;" class="card">
            <h3 style="color: #e63946;">Mantenimiento</h3>
            <div id="lista_admin"></div>
        </div>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    // Función de inicio con suavidad
    function iniciar() {
        const portada = document.getElementById('portada');
        portada.style.opacity = '0';
        portada.style.transform = 'scale(1.1)';
        
        setTimeout(() => {
            portada.style.display = 'none';
            document.getElementById('app').style.display = 'block';
            actualizarTodo();
        }, 800);
    }

    // Alertas Profesionales con SweetAlert2
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        background: '#1a3c34',
        color: '#fff'
    });

    async function actualizarTodo() {
        try {
            const [uRes, hRes] = await Promise.all([
                fetch(`${API}/lista-usuarios`),
                fetch(`${API}/lavandas_json`)
            ]);
            
            const usuarios = await uRes.json();
            const historial = await hRes.json();

            const select = document.getElementById('sel_usuario');
            if(usuarios.length > 0) {
                select.innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
                document.getElementById('lista_admin').innerHTML = usuarios.map(u => `
                    <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #eee;">
                        <span>${u.nombre}</span>
                        <button onclick="borrarU(${u.id})" style="color:#e63946; background:none; border:none; cursor:pointer;">Eliminar</button>
                    </div>
                `).join('');
            }

            document.getElementById('historial').innerHTML = historial.map(l => `
                <div class="registro-card animate__animated animate__fadeIn">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-weight:bold; color:var(--deep-green);">${l.nombre}</span>
                        <span style="font-size:0.8rem; opacity:0.5;">${new Date(l.fecha).toLocaleDateString()}</span>
                    </div>
                    <div style="margin: 15px 0; font-size: 1.1rem;">
                        📏 ${l.altura_cm}cm — <span style="color:var(--muted-lavender)">${l.estado_salud}</span>
                    </div>
                    <div style="font-style:italic; opacity:0.8; font-size:0.9rem; line-height:1.5;">"${l.observaciones}"</div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    async function registrar() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return Swal.fire('Error', 'El nombre es necesario', 'warning');

        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre })
        });

        document.getElementById('reg_nombre').value = "";
        Toast.fire({ icon: 'success', title: 'Investigador Registrado' });
        actualizarTodo();
    }

    async function guardar() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };

        if(!payload.notas) return Swal.fire('Atención', 'Describe tus observaciones', 'info');

        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        document.getElementById('obs_altura').value = "";
        document.getElementById('obs_notas').value = "";
        Toast.fire({ icon: 'success', title: 'Registro Guardado' });
        actualizarTodo();
    }

    function abrirAdmin() {
        Swal.fire({
            title: 'Acceso Restringido',
            input: 'password',
            inputAttributes: { autocapitalize: 'off' },
            showCancelButton: true,
            confirmButtonText: 'Entrar',
            confirmButtonColor: '#1a3c34'
        }).then((result) => {
            if (result.value === "osio2023") {
                document.getElementById('admin-panel').style.display = 'block';
                window.scrollTo(0,document.body.scrollHeight);
            }
        });
    }

    async function borrarU(id) {
        const result = await Swal.fire({
            title: '¿Estás seguro?',
            text: "Se borrará todo el historial de este investigador",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e63946',
            confirmButtonText: 'Sí, borrar'
        });

        if (result.isConfirmed) {
            await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' });
            actualizarTodo();
            Toast.fire({ icon: 'success', title: 'Eliminado correctamente' });
        }
    }
</script>
</body>
</html>
