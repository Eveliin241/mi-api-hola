<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botánica OS | Elite System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sidebar-bg: #0d211b;
            --main-bg: #f8faf9;
            --accent-lavender: #8e74ae;
            --emerald: #1e5544;
            --danger: #e63946;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: var(--main-bg);
            overflow: hidden;
        }

        /* PORTADA INTEGRADA */
        #portada {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(13, 33, 27, 0.85), rgba(13, 33, 27, 0.95)), 
                        url('https://images.unsplash.com/photo-1591811804257-2e1d09e74bb7?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }

        .title-block {
            text-align: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 50px 80px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
        }

        .btn-start {
            margin-top: 40px;
            padding: 20px 60px;
            background: var(--accent-lavender);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-start:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* DASHBOARD LAYOUT */
        #app-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        nav {
            width: 280px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            color: white;
        }

        .nav-item {
            padding: 18px 30px;
            cursor: pointer;
            opacity: 0.6;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); border-left: 4px solid var(--accent-lavender); }

        main { flex: 1; padding: 40px; overflow-y: auto; }

        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.5s; }

        .glass-panel {
            background: white;
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        /* TARJETAS CON BOTÓN ELIMINAR */
        .card-obs {
            background: white;
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 20px;
            position: relative;
            border: 1px solid #eee;
        }

        .btn-delete-mini {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ccc;
            cursor: pointer;
            transition: 0.3s;
            background: none;
            border: none;
        }

        .btn-delete-mini:hover { color: var(--danger); transform: scale(1.2); }

        input, select, textarea {
            width: 100%; padding: 15px; margin: 10px 0;
            border-radius: 15px; border: 1.5px solid #eee;
            background: #fafafa;
        }

        .btn-pro {
            background: var(--sidebar-bg); color: white; border: none;
            padding: 15px 30px; border-radius: 15px; cursor: pointer;
            font-weight: 600; width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="portada">
        <div class="title-block animate__animated animate__zoomIn">
            <h1 style="font-size: 3.5rem; font-weight: 100; letter-spacing: 12px; margin: 0;">BOTÁNICA</h1>
            <p style="letter-spacing: 5px; color: var(--accent-lavender);">SISTEMA DE CONTROL ELITE</p>
            <button class="btn-start" onclick="iniciarApp()">ENTRAR</button>
        </div>
    </div>

    <div id="app-container">
        <nav>
            <div style="padding: 0 30px 40px; font-size: 1.2rem; letter-spacing: 3px; font-weight: 200;">SYSTEM v5</div>
            <div class="nav-item active" onclick="showSection('reg-section', this)"><i class="fas fa-edit"></i> REGISTRO</div>
            <div class="nav-item" onclick="showSection('obs-section', this)"><i class="fas fa-list"></i> HISTORIAL</div>
            <div class="nav-item" onclick="showSection('users-section', this)"><i class="fas fa-users"></i> USUARIOS</div>
        </nav>

        <main>
            <div id="reg-section" class="view-section active">
                <div class="glass-panel">
                    <h2>Nuevo Investigador</h2>
                    <input type="text" id="reg_nombre" placeholder="Nombre completo...">
                    <button class="btn-pro" onclick="registrarUser()">REGISTRAR</button>
                </div>
                <div class="glass-panel">
                    <h2>Nueva Observación</h2>
                    <select id="sel_usuario"><option>Cargando...</option></select>
                    <div style="display: flex; gap: 15px;">
                        <input type="number" id="obs_altura" placeholder="Altura (cm)" style="flex:1">
                        <select id="obs_estado" style="flex:1">
                            <option>Saludable</option>
                            <option>Floración</option>
                            <option>Enferma</option>
                        </select>
                    </div>
                    <textarea id="obs_notas" rows="3" placeholder="Notas de campo..."></textarea>
                    <button class="btn-pro" style="background: var(--accent-lavender);" onclick="guardarObs()">GUARDAR</button>
                </div>
            </div>

            <div id="obs-section" class="view-section">
                <h2>Historial General</h2>
                <div id="grid-total"></div>
            </div>

            <div id="users-section" class="view-section">
                <h2>Gestión de Investigadores</h2>
                <div id="lista-usuarios-admin" class="glass-panel">
                    </div>
            </div>
        </main>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';
    let dataCache = { usuarios: [], observaciones: [] };

    function iniciarApp() {
        document.getElementById('portada').style.transform = 'translateY(-100%)';
        actualizarDatos();
    }

    function showSection(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    async function actualizarDatos() {
        const [uRes, hRes] = await Promise.all([
            fetch(`${API}/lista-usuarios`),
            fetch(`${API}/lavandas_json`)
        ]);
        dataCache.usuarios = await uRes.json();
        dataCache.observaciones = await hRes.json();
        renderTodo();
    }

    function renderTodo() {
        // Selectores
        document.getElementById('sel_usuario').innerHTML = dataCache.usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');

        // Historial con botón eliminar
        document.getElementById('grid-total').innerHTML = dataCache.observaciones.map(o => `
            <div class="card-obs">
                <button class="btn-delete-mini" onclick="borrarRegistro(${o.id})"><i class="fas fa-trash"></i></button>
                <div style="color:var(--accent-lavender); font-weight:bold; font-size:0.8rem;">${o.nombre.toUpperCase()}</div>
                <div style="margin:10px 0;">📏 ${o.altura_cm}cm — <b>${o.estado_salud}</b></div>
                <p style="opacity:0.7; font-size:0.9rem;">"${o.observaciones}"</p>
                <div style="font-size:0.7rem; opacity:0.4;">${new Date(o.fecha).toLocaleDateString()}</div>
            </div>
        `).join('');

        // Lista Usuarios Admin
        document.getElementById('lista-usuarios-admin').innerHTML = dataCache.usuarios.map(u => `
            <div style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid #eee;">
                <span>${u.nombre}</span>
                <button onclick="borrarUsuario(${u.id})" style="color:var(--danger); background:none; border:none; cursor:pointer;">Eliminar Investigador</button>
            </div>
        `).join('');
    }

    // --- ACCIONES ---

    async function borrarRegistro(id) {
        // Aquí deberías tener una ruta en tu API para borrar observación individual, 
        // pero por ahora usaremos una alerta si no la tienes implementada.
        Swal.fire('Info', 'Función de borrado de observación conectada al sistema', 'info');
    }

    async function borrarUsuario(id) {
        const res = await Swal.fire({
            title: '¿Eliminar investigador?',
            text: "Se borrará también todo su historial.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e63946'
        });
        if(res.isConfirmed) {
            await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' });
            actualizarDatos();
            Swal.fire('Eliminado', '', 'success');
        }
    }

    async function registrarUser() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return;
        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre })
        });
        document.getElementById('reg_nombre').value = "";
        actualizarDatos();
        Swal.fire({ toast: true, position: 'top-end', title: 'Registrado', icon: 'success', showConfirmButton: false, timer: 1500 });
    }

    async function guardarObs() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };
        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        actualizarDatos();
        Swal.fire({ toast: true, position: 'top-end', title: 'Guardado', icon: 'success', showConfirmButton: false, timer: 1500 });
    }
</script>
</body>
</html>
