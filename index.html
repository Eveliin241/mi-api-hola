<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botánica | Investigación</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary: #0b3d2e;     /* Esmeralda muy profundo */
            --accent: #9d81ba;      /* Lavanda vibrante pero limpio */
            --glass: rgba(255, 255, 255, 0.95);
            --bg-gradient: linear-gradient(135deg, #f0f4f3 0%, #e8e0e6 100%);
        }

        body {
            margin: 0;
            background: var(--bg-gradient);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            color: var(--primary);
            min-height: 100vh;
        }

        /* PORTADA IMPACTANTE */
        #portada {
            height: 100vh;
            background: linear-gradient(rgba(11, 61, 46, 0.8), rgba(11, 61, 46, 0.95)), 
                        url('https://images.unsplash.com/photo-1471193945509-9ad0617afabf?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            z-index: 10;
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 200;
            letter-spacing: 15px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn-main {
            padding: 20px 60px;
            background: white;
            color: var(--primary);
            border: none;
            border-radius: 100px;
            font-weight: 600;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .btn-main:hover { transform: scale(1.05); background: var(--accent); color: white; }

        /* LAYOUT FULL SCREEN (Adiós a los bordes vacíos) */
        #app {
            display: none;
            display: grid;
            grid-template-columns: 350px 1fr; /* Panel lateral y contenido */
            height: 100vh;
            animation: fadeIn 0.8s ease;
        }

        /* Panel Izquierdo: Registros y Admin */
        .sidebar {
            background: var(--primary);
            color: white;
            padding: 40px 30px;
            overflow-y: auto;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1);
        }

        /* Panel Derecho: Formularios */
        .main-content {
            padding: 60px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Estilo de Tarjetas Integradas (No Formulario de Google) */
        .glass-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.5);
        }

        h2 { font-weight: 300; letter-spacing: 1px; margin-top: 0; }

        input, select, textarea {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            background: white;
            border: 1.5px solid #eee;
            border-radius: 18px;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px rgba(157, 129, 186, 0.1); }

        .btn-action {
            background: var(--primary);
            color: white;
            padding: 18px;
            border: none;
            border-radius: 18px;
            width: 100%;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover { filter: brightness(1.3); transform: translateY(-2px); }

        /* Items del Historial en el Sidebar */
        .historial-item {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent);
            font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            #app { grid-template-columns: 1fr; }
            .sidebar { display: none; } /* En móvil se simplifica */
        }
    </style>
</head>
<body>

    <div id="portada">
        <h1 class="hero-title">Botánica</h1>
        <p style="letter-spacing: 5px; opacity: 0.7; margin-bottom: 40px;">SISTEMA DE MONITOREO PROFESIONAL</p>
        <button class="btn-main" onclick="entrar()">ENTRAR A BITÁCORA</button>
    </div>

    <div id="app" style="display: none;">
        <aside class="sidebar">
            <h2 style="color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px;">Historial</h2>
            <div id="lista_historial">
                </div>
        </aside>

        <main class="main-content">
            <div class="glass-card animate__animated animate__fadeInRight">
                <h2>👤 Registro de Investigador</h2>
                <input type="text" id="reg_nombre" placeholder="Nombre completo">
                <button class="btn-action" onclick="registrar()">DAR DE ALTA</button>
            </div>

            <div class="glass-card animate__animated animate__fadeInRight" style="animation-delay: 0.2s;">
                <h2>📝 Nueva Observación</h2>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <select id="sel_usuario"><option>Cargando...</option></select>
                    <select id="obs_estado">
                        <option>Saludable</option>
                        <option>En Floración</option>
                        <option>Estrés Hídrico</option>
                    </select>
                </div>
                <input type="number" id="obs_altura" placeholder="Altura de planta (cm)">
                <textarea id="obs_notas" rows="3" placeholder="Notas sobre el estado foliar..."></textarea>
                <button class="btn-action" style="background: var(--accent);" onclick="guardar()">GUARDAR REGISTRO</button>
            </div>
            
            <div style="text-align: right; opacity: 0.2; cursor: pointer;" onclick="abrirAdmin()">Configuración</div>
        </main>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    function entrar() {
        document.getElementById('portada').style.display = 'none';
        document.getElementById('app').style.display = 'grid';
        actualizarTodo();
    }

    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 2500,
        background: '#0b3d2e',
        color: '#fff'
    });

    async function actualizarTodo() {
        const [uRes, hRes] = await Promise.all([
            fetch(`${API}/lista-usuarios`),
            fetch(`${API}/lavandas_json`)
        ]);
        
        const usuarios = await uRes.json();
        const historial = await hRes.json();

        // Selector y Sidebar
        document.getElementById('sel_usuario').innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
        
        document.getElementById('lista_historial').innerHTML = historial.map(h => `
            <div class="historial-item">
                <div style="color:var(--accent); font-weight:bold; margin-bottom:5px;">${h.nombre}</div>
                <div>${h.altura_cm}cm — ${h.estado_salud}</div>
                <div style="opacity:0.6; font-size:0.8rem; margin-top:5px;">${h.observaciones}</div>
            </div>
        `).join('');
    }

    async function registrar() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return Swal.fire('Error', 'Escribe un nombre', 'error');
        
        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre })
        });
        
        document.getElementById('reg_nombre').value = "";
        Toast.fire({ icon: 'success', title: 'Investigador Registrado' });
        actualizarTodo();
    }

    async function guardar() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };
        
        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        Toast.fire({ icon: 'success', title: 'Registro Exitoso' });
        actualizarTodo();
    }

    function abrirAdmin() {
        Swal.fire({
            title: 'Acceso Admin',
            input: 'password',
            confirmButtonColor: '#0b3d2e'
        }).then(res => {
            if(res.value === "osio2023") Toast.fire({title: "Modo Admin Activo"});
        });
    }
</script>
</body>
</html>
