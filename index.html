<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud & Lavanda</title>
    <link rel="icon" href="https://fonts.gstatic.com/s/i/short-term/release/googlestylesheet/leaf/default/24px.svg">
    <style>
        :root { --verde: #4CAF50; --lavanda: #9575cd; --fondo: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        h1, h2 { text-align: center; color: var(--verde); }
        h2 { color: var(--lavanda); margin-top: 40px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        input, select, textarea { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        button { grid-column: span 2; padding: 15px; background: var(--verde); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #388E3C; transform: scale(1.02); }
        .status-box { background: #e8f5e9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--verde); margin-bottom: 20px; }
        .registro-card { background: #f9f9f9; padding: 15px; border-radius: 10px; margin-top: 10px; border-left: 4px solid var(--lavanda); }
    </style>
</head>
<body>

<div class="container">
    <h1>🌿 Proyecto Salud & Lavanda</h1>
    
    <div class="status-box">
        <strong>📢 Estado del Huerto:</strong>
        <p id="msg-huerto">Cargando...</p>
    </div>

    <h2>🥗 Perfil de Salud Personal</h2>
    <form id="regForm" class="grid">
        <input type="text" id="n" placeholder="Nombre completo">
        <input type="email" id="e" placeholder="Correo">
        <input type="password" id="p" placeholder="Contraseña">
        <input type="number" id="ed" placeholder="Edad">
        <input type="number" step="0.1" id="pe" placeholder="Peso (kg)">
        <input type="number" step="0.01" id="al" placeholder="Altura (m)">
        <select id="af"><option value="baja">Actividad Baja</option><option value="media">Media</option><option value="alta">Alta</option></select>
        <select id="ob"><option value="mantener">Mantener Salud</option><option value="bajar">Bajar Peso</option><option value="subir">Subir Masa</option></select>
        <button type="button" onclick="registrar()">✨ GUARDAR PERFIL</button>
    </form>

    <h2>📝 Diario de Campo</h2>
    <div class="grid">
        <div style="grid-column: span 2">
            <label>👤 ¿Quién registra hoy?</label>
            <select id="sel_u"><option>Cargando...</option></select>
        </div>
        <input type="number" id="obs_a" placeholder="Altura Planta (cm)">
        <select id="obs_e"><option>Saludable</option><option>Excelente</option><option>Seca</option></select>
        <textarea id="obs_n" style="grid-column: span 2" placeholder="Observaciones del día..."></textarea>
        <button type="button" style="background: var(--lavanda)" onclick="subirNota()">💾 GUARDAR EN EL DIARIO</button>
    </div>

    <h2>📅 Historial Reciente</h2>
    <div id="historial"></div>
</div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    window.onload = () => { cargarUsuarios(); cargarHistorial(); fetch(`${API}/datos`).then(r=>r.json()).then(d=>document.getElementById('msg-huerto').innerText=d.data.observaciones); };

    async function cargarUsuarios() {
        const r = await fetch(`${API}/lista-usuarios`);
        const u = await r.json();
        document.getElementById('sel_u').innerHTML = u.map(i => `<option value="${i.id}">${i.nombre}</option>`).join('');
    }

    function registrar() {
        const d = { nombre: document.getElementById('n').value, email: document.getElementById('e').value, password: document.getElementById('p').value, edad: document.getElementById('ed').value, peso: document.getElementById('pe').value, altura: document.getElementById('al').value, actividad_fisica: document.getElementById('af').value, objetivo: document.getElementById('ob').value };
        fetch(`${API}/registrar`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) }).then(() => { alert("¡Perfil Creado!"); cargarUsuarios(); });
    }

    async function subirNota() {
        const d = { usuario_id: document.getElementById('sel_u').value, altura: document.getElementById('obs_a').value, estado: document.getElementById('obs_e').value, notas: document.getElementById('obs_n').value };
        await fetch(`${API}/nueva-observacion`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d) });
        alert("¡Nota guardada!"); cargarHistorial();
    }

    function cargarHistorial() {
        fetch(`${API}/lavandas_json`).then(r=>r.json()).then(data => {
            document.getElementById('historial').innerHTML = data.map(l => `
                <div class="registro-card">
                    <b>👤 ${l.nombre}</b> | <small>${new Date(l.fecha).toLocaleDateString()}</small><br>
                    📏 ${l.altura_cm}cm - ${l.estado_salud}<br>
                    <i>"${l.observaciones}"</i>
                </div>
            `).join('');
        });
    }
</script>
</body>
</html>
