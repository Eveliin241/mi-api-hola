<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botánica OS | Management System</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --sidebar-bg: #0d211b; /* Verde casi negro, muy elegante */
            --main-bg: #f8faf9;
            --accent-lavender: #8e74ae;
            --emerald: #1e5544;
            --glass-white: rgba(255, 255, 255, 0.9);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--main-bg);
            color: #333;
            overflow: hidden;
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR DE ALTO NIVEL */
        nav {
            width: 280px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            color: white;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .brand {
            padding: 0 30px 40px;
            font-size: 1.5rem;
            letter-spacing: 4px;
            font-weight: 200;
            text-transform: uppercase;
            color: var(--accent-lavender);
        }

        .nav-item {
            padding: 18px 30px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 0.95rem;
            opacity: 0.7;
            border-left: 4px solid transparent;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); opacity: 1; }
        .nav-item.active { 
            background: rgba(255,255,255,0.1); 
            opacity: 1; 
            border-left-color: var(--accent-lavender); 
        }

        /* CONTENEDOR PRINCIPAL */
        main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }

        /* CARDS ESTILO DASHBOARD */
        .glass-panel {
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            margin-bottom: 30px;
            border: 1px solid #f0f0f0;
        }

        h2 { font-weight: 300; font-size: 1.8rem; margin-top: 0; color: var(--sidebar-bg); }

        /* GRILLA DE OBSERVACIONES */
        .grid-observaciones {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card-obs {
            background: white;
            padding: 20px;
            border-radius: 20px;
            border-bottom: 4px solid var(--accent-lavender);
            transition: 0.3s;
        }

        .card-obs:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.05); }

        /* FORMULARIOS LIMPIOS */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, select, textarea {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1.5px solid #eee;
            margin: 10px 0;
            box-sizing: border-box;
            background: #fafafa;
        }
        
        button.btn-pro {
            background: var(--sidebar-bg);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        button.btn-pro:hover { background: var(--emerald); transform: scale(1.02); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <div class="brand">Botánica</div>
        <div class="nav-item active" onclick="showSection('reg-section', this)">
            <i class="fas fa-plus-circle"></i> Nueva Entrada
        </div>
        <div class="nav-item" onclick="showSection('obs-section', this)">
            <i class="fas fa-leaf"></i> Observaciones
        </div>
        <div class="nav-item" onclick="showSection('users-section', this)">
            <i class="fas fa-microscope"></i> Investigadores
        </div>
        <div style="margin-top: auto; padding: 30px; opacity: 0.3; font-size: 0.7rem;">
            SYSTEM v5.0 | OSIO
        </div>
    </nav>

    <main>
        
        <div id="reg-section" class="view-section active">
            <div class="glass-panel">
                <h2>Alta de Investigador</h2>
                <input type="text" id="reg_nombre" placeholder="Nombre del nuevo investigador...">
                <button class="btn-pro" onclick="registrarUser()">REGISTRAR</button>
            </div>

            <div class="glass-panel">
                <h2>Bitácora Diaria</h2>
                <div class="form-row">
                    <select id="sel_usuario"><option>Cargando lista...</option></select>
                    <select id="obs_estado">
                        <option>Saludable</option>
                        <option>Floración</option>
                        <option>Estresada</option>
                    </select>
                </div>
                <input type="number" id="obs_altura" placeholder="Altura medida (cm)">
                <textarea id="obs_notas" rows="4" placeholder="Observaciones cualitativas del ejemplar..."></textarea>
                <button class="btn-pro" style="background: var(--accent-lavender);" onclick="guardarObs()">GUARDAR EN NUBE</button>
            </div>
        </div>

        <div id="obs-section" class="view-section">
            <h2 style="margin-bottom: 30px;">Historial de Campo</h2>
            <div id="grid-total" class="grid-observaciones"></div>
        </div>

        <div id="users-section" class="view-section">
            <h2 style="margin-bottom: 30px;">Explorar por Investigador</h2>
            <div id="investigadores-list" style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 40px;">
                </div>
            <div id="user-details" class="grid-observaciones">
                <p style="opacity: 0.5;">Selecciona un investigador para ver su historial específico.</p>
            </div>
        </div>

    </main>

<script>
    const API = 'https://mi-api-hola.onrender.com';
    let dataCache = { usuarios: [], observaciones: [] };

    function showSection(sectionId, element) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(sectionId).classList.add('active');
        element.classList.add('active');
    }

    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 2000,
        background: '#0d211b',
        color: '#fff'
    });

    async function actualizarDatos() {
        const [uRes, hRes] = await Promise.all([
            fetch(`${API}/lista-usuarios`),
            fetch(`${API}/lavandas_json`)
        ]);
        
        dataCache.usuarios = await uRes.json();
        dataCache.observaciones = await hRes.json();

        renderTodo();
    }

    function renderTodo() {
        // Llenar selectores
        const select = document.getElementById('sel_usuario');
        select.innerHTML = dataCache.usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');

        // Renderizar Historial General
        const gridTotal = document.getElementById('grid-total');
        gridTotal.innerHTML = dataCache.observaciones.map(h => `
            <div class="card-obs animate__animated animate__fadeIn">
                <div style="font-size: 0.8rem; text-transform: uppercase; color: var(--accent-lavender); font-weight: bold;">${h.nombre}</div>
                <div style="margin: 10px 0; font-weight: bold;">📏 ${h.altura_cm}cm — ${h.estado_salud}</div>
                <p style="font-size: 0.9rem; opacity: 0.7; font-style: italic;">"${h.observaciones}"</p>
                <div style="font-size: 0.7rem; opacity: 0.4;">${new Date(h.fecha).toLocaleDateString()}</div>
            </div>
        `).join('');

        // Renderizar Botones de Investigadores
        const invList = document.getElementById('investigadores-list');
        invList.innerHTML = dataCache.usuarios.map(u => `
            <button onclick="filtrarPorUser(${u.id})" class="btn-pro" style="background:white; color:var(--sidebar-bg); border:1px solid #eee;">
                ${u.nombre}
            </button>
        `).join('');
    }

    function filtrarPorUser(userId) {
        const filtrados = dataCache.observaciones.filter(o => o.usuario_id == userId);
        const detailDiv = document.getElementById('user-details');
        
        if(filtrados.length === 0) {
            detailDiv.innerHTML = "<p>Este investigador aún no tiene registros.</p>";
            return;
        }

        detailDiv.innerHTML = filtrados.map(h => `
            <div class="card-obs animate__animated animate__zoomIn">
                <div style="margin: 10px 0; font-weight: bold;">📏 ${h.altura_cm}cm — ${h.estado_salud}</div>
                <p style="font-size: 0.9rem; opacity: 0.7;">"${h.observaciones}"</p>
            </div>
        `).join('');
    }

    async function registrarUser() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return;
        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre })
        });
        document.getElementById('reg_nombre').value = "";
        Toast.fire({ icon: 'success', title: 'Registrado' });
        actualizarDatos();
    }

    async function guardarObs() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };
        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        Toast.fire({ icon: 'success', title: 'Sincronizado' });
        actualizarDatos();
    }

    // Inicio
    actualizarDatos();
</script>
</body>
</html>
