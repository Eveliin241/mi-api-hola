<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huerto de Lavanda</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    
    <style>
        :root {
            --soft-green: #e8f5e9;
            --deep-green: #2e7d32;
            --soft-purple: #f3e5f5;
            --lavender: #9575cd;
            --text: #2c3e50;
        }
        
        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            color: var(--text);
            min-height: 100vh;
        }

        /* Pantalla de Inicio */
        #portada {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #a8e6cf 0%, #dcedc1 100%);
            text-align: center;
        }

        .btn-principal {
            padding: 15px 35px;
            background: var(--deep-green);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Contenedor principal */
        #app { display: none; padding: 20px; max-width: 800px; margin: auto; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-top: 5px solid var(--lavender);
        }

        h2 { color: var(--lavender); margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #eee;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }

        input:focus { border-color: var(--lavender); }

        .btn-accion {
            background: var(--lavender);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-accion:hover { opacity: 0.9; transform: translateY(-2px); }

        /* Historial */
        .registro-item {
            background: var(--soft-green);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            border-left: 5px solid var(--deep-green);
        }

        .admin-trigger { 
            text-align: center; 
            margin-top: 40px; 
            font-size: 0.7rem; 
            color: #ccc; 
            cursor: pointer; 
        }

        #admin-panel { display: none; background: #fff1f1; padding: 20px; border-radius: 15px; border: 1px solid #ffcdd2; }
    </style>
</head>
<body>

    <div id="portada">
        <div style="font-size: 80px;">🌿</div>
        <h1 style="color: var(--deep-green); margin: 0;">Salud & Lavanda</h1>
        <p style="color: #666; margin-bottom: 30px;">Sistema de Seguimiento de Cultivo</p>
        <button class="btn-principal" onclick="activarApp()">INGRESAR AL DIARIO</button>
    </div>

    <div id="app">
        <div class="card" style="border-top-color: var(--deep-green);">
            <h2>👤 Registro de Investigador</h2>
            <input type="text" id="reg_nombre" placeholder="Escribe tu nombre aquí...">
            <button class="btn-accion" style="background: var(--deep-green);" onclick="registrarUsuario()">REGISTRAR NOMBRE</button>
        </div>

        <div class="card">
            <h2>📝 Diario de Campo</h2>
            <label>Selecciona tu nombre:</label>
            <select id="sel_usuario">
                <option value="">Cargando lista...</option>
            </select>
            
            <input type="number" id="obs_altura" placeholder="Altura de la planta (cm)">
            
            <label>Estado de salud:</label>
            <select id="obs_estado">
                <option>Saludable</option>
                <option>Crecimiento Rápido</option>
                <option>Necesita Riego</option>
                <option>En Observación</option>
            </select>
            
            <textarea id="obs_notas" rows="3" placeholder="Escribe tus observaciones del día..."></textarea>
            <button class="btn-accion" onclick="guardarNota()">GUARDAR EN EL HISTORIAL</button>
        </div>

        <h2 style="color: var(--deep-green);">📅 Notas Recientes</h2>
        <div id="historial"></div>

        <div class="admin-trigger" onclick="checkAdmin()">Panel de Control Externo</div>
        
        <div id="admin-panel">
            <h3 style="color: #d32f2f;">Eliminar Usuarios</h3>
            <div id="lista_admin"></div>
        </div>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    async function activarApp() {
        document.getElementById('portada').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        await actualizarTodo();
    }

    async function actualizarTodo() {
        try {
            // 1. Cargar Usuarios
            const resU = await fetch(`${API}/lista-usuarios`);
            const usuarios = await resU.json();
            const select = document.getElementById('sel_usuario');
            const adminList = document.getElementById('lista_admin');

            if (usuarios.length > 0) {
                select.innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
                adminList.innerHTML = usuarios.map(u => `
                    <div style="display:flex; justify-content:space-between; margin:5px 0; border-bottom:1px solid #eee; padding:5px;">
                        <span>${u.nombre}</span>
                        <button onclick="eliminarU(${u.id})" style="color:red; border:none; background:none; cursor:pointer;">Borrar</button>
                    </div>
                `).join('');
            } else {
                select.innerHTML = '<option value="">Primero registra un nombre</option>';
            }

            // 2. Cargar Historial
            const resH = await fetch(`${API}/lavandas_json`);
            const notas = await resH.json();
            const histDiv = document.getElementById('historial');
            
            histDiv.innerHTML = notas.map(n => `
                <div class="registro-item">
                    <div style="display:flex; justify-content:space-between; font-size:0.9rem; font-weight:bold;">
                        <span>👤 ${n.nombre}</span>
                        <span style="color:#888;">📅 ${new Date(n.fecha).toLocaleDateString()}</span>
                    </div>
                    <div style="margin:8px 0;">📏 ${n.altura_cm} cm | ✨ ${n.estado_salud}</div>
                    <div style="font-style:italic; font-size:0.95rem; color:#444;">"${n.observaciones}"</div>
                </div>
            `).join('');

        } catch (e) {
            console.error("Error cargando datos");
        }
    }

    async function registrarUsuario() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return alert("Escribe un nombre");
        
        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre })
        });
        
        document.getElementById('reg_nombre').value = "";
        alert("¡Nombre registrado correctamente!");
        await actualizarTodo(); // Actualiza el selector inmediatamente
    }

    async function guardarNota() {
        const user_id = document.getElementById('sel_usuario').value;
        if(!user_id) return alert("Selecciona un investigador");

        const data = {
            usuario_id: user_id,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };

        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });

        document.getElementById('obs_altura').value = "";
        document.getElementById('obs_notas').value = "";
        alert("Nota guardada en el historial");
        await actualizarTodo();
    }

    function checkAdmin() {
        const p = prompt("Clave de seguridad:");
        if(p === "osio2023") {
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    async function eliminarU(id) {
        if(confirm("¿Eliminar investigador?")) {
            await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' });
            await actualizarTodo();
        }
    }

</script>
</body>
</html>
