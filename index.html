<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌿 Botánica OS</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg-deep: #050a09; --sidebar-mate: #0d1a16; --glass-panel: rgba(20, 35, 30, 0.6);
            --accent-mate: #7a6a75; --text-mate: #c0c0b5; --text-bright: #ffffff; --danger-mate: #a63a50;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-mate); overflow: hidden; }
        #global-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1501004318641-729e8e398642?auto=format&fit=crop&w=1600&q=80'); background-size: cover; z-index: -1; }
        
        #portada { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; z-index: 1000; transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1); background: var(--bg-deep); }
        .welcome-card { text-align: center; position: relative; }
        .plant-icon { font-size: 5rem; margin-bottom: 10px; display: block; animation: pulse 2s infinite; }
        .brand-script { font-family: 'Great Vibes', cursive; font-size: 6rem; color: var(--text-bright); margin: 0; }
        .btn-enter { margin-top: 40px; padding: 18px 50px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.2); cursor: pointer; font-weight: 600; background: transparent; color: var(--text-bright); transition: 0.3s; }
        .btn-enter:hover { background: var(--text-bright); color: var(--bg-deep); }

        #app-wrapper { display: flex; width: 100vw; height: 100vh; }
        #top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; display: flex; align-items: center; padding: 0 25px; z-index: 900; background: rgba(5,10,9,0.5); backdrop-filter: blur(10px); }
        #menu-toggle { background: none; border: none; color: var(--text-bright); font-size: 1.5rem; cursor: pointer; }
        
        nav { width: 260px; background: var(--sidebar-mate); display: flex; flex-direction: column; padding: 90px 0 20px 0; transition: 0.4s; z-index: 850; }
        nav.collapsed { width: 0; opacity: 0; pointer-events: none; }
        .nav-item { padding: 18px 25px; cursor: pointer; opacity: 0.5; display: flex; align-items: center; gap: 15px; transition: 0.3s; white-space: nowrap; }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.03); color: var(--text-bright); border-right: 3px solid var(--accent-mate); }
        
        main { flex-grow: 1; padding: 100px 40px; overflow-y: auto; }
        .view-section { display: none; width: 100%; max-width: 800px; margin: 0 auto; }
        .view-section.active { display: block; animation: fadeIn 0.6s ease; }
        
        .glass-card { background: var(--glass-panel); border-radius: 25px; padding: 35px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.03); }
        h2 { font-weight: 300; letter-spacing: 2px; color: var(--text-bright); margin-bottom: 20px; }
        
        input, select, textarea { width: 100%; padding: 16px; margin: 8px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); background: rgba(0,0,0,0.3); color: #fff; font-family: inherit; box-sizing: border-box; }
        select option { background: #0d1a16; color: #fff; }

        .btn-action { background: var(--accent-mate); color: white; border: none; padding: 16px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; }
        .admin-trigger { margin-top: auto; padding: 20px; opacity: 0.2; cursor: pointer; font-size: 0.8rem; text-align: center; }
        
        .history-card { border-left: 3px solid var(--accent-mate); padding-left: 20px; margin-bottom: 30px; }
        .history-user { color: var(--accent-mate); font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .history-date { font-size: 0.7rem; opacity: 0.4; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="global-bg"></div>
    <div id="portada">
        <div class="welcome-card animate__animated animate__fadeIn">
            <span class="plant-icon">🌿</span>
            <h1 class="brand-script">Botánica</h1>
            <button class="btn-enter" onclick="iniciarApp()">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div id="top-bar">
        <button id="menu-toggle" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <span style="margin-left: 20px; letter-spacing: 3px; font-size: 0.8rem; opacity: 0.5;">ELITE RESEARCH</span>
    </div>

    <div id="app-wrapper">
        <nav id="sidebar">
            <div class="nav-item active" onclick="showSection('user-section', this)"><i class="fas fa-user-plus"></i> <span>REGISTRO</span></div>
            <div class="nav-item" onclick="showSection('reg-section', this)"><i class="fas fa-seedling"></i> <span>OBSERVACIÓN</span></div>
            <div class="nav-item" onclick="showSection('obs-section', this)"><i class="fas fa-history"></i> <span>HISTORIAL</span></div>
            <div class="admin-trigger" onclick="abrirAdmin()"><i class="fas fa-lock"></i> CONFIG</div>
        </nav>

        <main>
            <div id="user-section" class="view-section active">
                <div class="glass-card">
                    <h2>Nuevo Investigador 🌿</h2>
                    <input type="text" id="reg_nombre" placeholder="Nombre completo..." autocomplete="off">
                    <button class="btn-action" onclick="registrarUser()">DAR DE ALTA</button>
                </div>
            </div>

            <div id="reg-section" class="view-section">
                <div class="glass-card">
                    <h2>Datos de la Lavanda 🌿</h2>
                    <label style="font-size: 0.7rem; opacity: 0.6;">INVESTIGADOR:</label>
                    <select id="sel_usuario"></select>
                    
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <div style="flex:1;">
                            <label style="font-size: 0.7rem; opacity: 0.6;">ALTURA (CM):</label>
                            <input type="number" id="obs_altura" placeholder="Ej: 25">
                        </div>
                        <div style="flex:1;">
                            <label style="font-size: 0.7rem; opacity: 0.6;">ANCHO (CM):</label>
                            <input type="number" id="obs_ancho" placeholder="Ej: 15">
                        </div>
                    </div>

                    <label style="font-size: 0.7rem; opacity: 0.6;">ESTADO FISIOLÓGICO:</label>
                    <select id="obs_estado">
                        <option>Saludable</option>
                        <option>Floración</option>
                        <option>Estrés</option>
                        <option>Cosecha</option>
                    </select>

                    <label style="font-size: 0.7rem; opacity: 0.6;">NOTAS TÉCNICAS:</label>
                    <textarea id="obs_notas" rows="3" placeholder="Describe hallazgos específicos..."></textarea>
                    <button class="btn-action" onclick="guardarObs()">GUARDAR BITÁCORA</button>
                </div>
            </div>

            <div id="obs-section" class="view-section">
                <h2>Historial de Campo 🌿</h2>
                <div id="pills-usuarios" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom: 25px;"></div>
                <div id="grid-dinamico"></div>
            </div>

            <div id="admin-panel" class="view-section">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
                    <h2 style="color:var(--danger-mate); margin:0;">Mantenimiento</h2>
                    <button onclick="cerrarAdmin()" style="background:none; border:1px solid rgba(255,255,255,0.2); color:white; padding:8px 15px; border-radius:8px; cursor:pointer;">CERRAR</button>
                </div>
                <div id="lista-borrar" class="glass-card"></div>
            </div>
        </main>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';
    let dataCache = { usuarios: [], observaciones: [] };

    function iniciarApp() { document.getElementById('portada').style.transform = 'translateY(-100%)'; actualizarDatos(); }
    function toggleMenu() { const s = document.getElementById('sidebar'); s.classList.toggle('collapsed'); }

    function showSection(id, el) {
        document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(el) el.classList.add('active');
        if(id === 'obs-section') renderObservaciones(dataCache.observaciones);
    }

    async function actualizarDatos() {
        try {
            const [uRes, hRes] = await Promise.all([fetch(`${API}/lista-usuarios`), fetch(`${API}/lavandas_json`)]);
            dataCache.usuarios = await uRes.json();
            dataCache.observaciones = await hRes.json();
            
            document.getElementById('sel_usuario').innerHTML = dataCache.usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
            document.getElementById('pills-usuarios').innerHTML = `<div onclick="renderObservaciones(dataCache.observaciones)" style="padding:6px 12px; background:rgba(255,255,255,0.05); border-radius:8px; cursor:pointer; font-size:0.8rem;">TODOS</div>` + 
                dataCache.usuarios.map(u => `<div onclick="filtrarPorUser(${u.id})" style="padding:6px 12px; background:rgba(255,255,255,0.05); border-radius:8px; cursor:pointer; font-size:0.8rem;">${u.nombre}</div>`).join('');
            
            if (document.getElementById('admin-panel').classList.contains('active')) renderListaBorrar();
        } catch (e) { console.error(e); }
    }

    function renderObservaciones(lista) {
        document.getElementById('grid-dinamico').innerHTML = lista.map(o => `
            <div class="history-card">
                <div class="history-user">${o.nombre} <span class="history-date">${o.fecha || ''}</span></div>
                <div style="color:#fff; margin:5px 0;">📏 H: ${o.altura_cm}cm | W: ${o.ancho_cm || 0}cm — <b>${o.estado_salud}</b></div>
                <div style="font-size:0.9rem; opacity:0.7;">"${o.observaciones}"</div>
            </div>
        `).join('');
    }

    function filtrarPorUser(id) { renderObservaciones(dataCache.observaciones.filter(o => o.usuario_id == id)); }

    async function abrirAdmin() {
        const { value: pass } = await Swal.fire({ 
            title: 'Acceso Restringido', 
            input: 'password', 
            confirmButtonColor: '#7a6a75', 
            background: '#0d1a16', 
            color: '#fff',
            inputAttributes: { autocomplete: 'new-password' } 
        });
        if (pass === 'osio2023') { renderListaBorrar(); showSection('admin-panel'); } 
        else if (pass) { Swal.fire({ icon: 'error', title: 'Incorrecto', background: '#0d1a16', color: '#fff' }); }
    }

    function cerrarAdmin() { showSection('user-section', document.querySelector('.nav-item')); }

    function renderListaBorrar() {
        document.getElementById('lista-borrar').innerHTML = dataCache.usuarios.map(u => `
            <div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.05);">
                <span>${u.nombre}</span>
                <button onclick="borrarU(${u.id})" style="color:var(--danger-mate); background:none; border:none; cursor:pointer;">ELIMINAR</button>
            </div>
        `).join('');
    }

    async function borrarU(id) {
        const result = await Swal.fire({ title: '¿Eliminar usuario y registros?', icon: 'warning', showCancelButton: true, confirmButtonColor: '#a63a50', background: '#0d1a16', color: '#fff' });
        if (result.isConfirmed) { await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' }); await actualizarDatos(); }
    }

    async function registrarUser() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return;
        await fetch(`${API}/registrar`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ nombre }) });
        document.getElementById('reg_nombre').value = "";
        actualizarDatos();
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Registrado', showConfirmButton: false, timer: 2000 });
    }

    async function guardarObs() {
        const payload = { 
            usuario_id: document.getElementById('sel_usuario').value, 
            altura: document.getElementById('obs_altura').value, 
            ancho_cm: document.getElementById('obs_ancho').value, // Arreglado aquí para la API
            estado: document.getElementById('obs_estado').value, 
            notas: document.getElementById('obs_notas').value 
        };
        await fetch(`${API}/nueva-observacion`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        document.getElementById('obs_altura').value = ""; 
        document.getElementById('obs_ancho').value = "";
        document.getElementById('obs_notas').value = "";
        actualizarDatos();
        Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Bitácora Guardada', showConfirmButton: false, timer: 2000 });
    }
</script>
</body>
</html>
