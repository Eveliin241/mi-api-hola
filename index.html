<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud & Lavanda - Proyecto Escolar</title>
    <style>
        :root { --verde: #4CAF50; --lavanda: #9575cd; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--verde); text-align: center; }
        h2 { color: var(--lavanda); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 30px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; width: 100%; box-sizing: border-box; }
        button { grid-column: span 2; padding: 15px; background: var(--verde); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 16px; }
        button:hover { background: #388E3C; transform: translateY(-2px); }
        .status-card { background: #e8f5e9; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 5px solid var(--verde); }
        #lista-lavandas { margin-top: 20px; font-size: 0.9em; color: #666; background: #f9f9f9; padding: 15px; border-radius: 8px; }
        .registro-item { border-bottom: 1px solid #eee; padding: 8px 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 Proyecto Salud & Lavanda</h1>
    
    <div class="status-card">
        <strong>📢 Estado Actual:</strong>
        <p id="mensaje-huerto">Conectando con el huerto...</p>
    </div>

    <h2>🥗 Registro de Sana Alimentación</h2>
    <p>Completa tu perfil para calcular tu IMC y recibir seguimiento.</p>
    
    <form id="registroForm" class="grid-form">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <input type="number" id="edad" placeholder="Edad" required>
        <input type="number" step="0.1" id="peso" placeholder="Peso (kg)" required>
        <input type="number" step="0.01" id="altura" placeholder="Altura (m)" required>
        
        <select id="actividad_fisica" required>
            <option value="">Actividad Física</option>
            <option value="baja">Baja (Sedentario)</option>
            <option value="media">Media (Activo)</option>
            <option value="alta">Alta (Atleta)</option>
        </select>

        <select id="objetivo" required>
            <option value="">Objetivo de Salud</option>
            <option value="bajar">Bajar de peso</option>
            <option value="mantener">Mantener salud</option>
            <option value="subir">Subir masa muscular</option>
        </select>

        <button type="button" onclick="registrarUsuario()">🚀 GUARDAR PERFIL PROFESIONAL</button>
    </form>

    <h2>🐝 Diario del Huerto Polinizador</h2>
    <div id="lista-lavandas">Buscando registros de las lavandas...</div>
</div>

<script>
    const URL_API = 'https://mi-api-hola.onrender.com';

    // 1. Cargar el mensaje dinámico de bienvenida
    fetch(`${URL_API}/datos`)
        .then(res => res.json())
        .then(data => {
            // Ajustamos para leer la nueva estructura que te di en el index.js
            document.getElementById('mensaje-huerto').innerText = data.data ? data.data.observaciones : data.mensaje;
        })
        .catch(() => document.getElementById('mensaje-huerto').innerText = "Servidor en mantenimiento.");

    // 2. Función de Registro
    function registrarUsuario() {
        const datos = {
            nombre: document.getElementById('nombre').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            edad: parseInt(document.getElementById('edad').value),
            peso: parseFloat(document.getElementById('peso').value),
            altura: parseFloat(document.getElementById('altura').value),
            actividad_fisica: document.getElementById('actividad_fisica').value,
            objetivo: document.getElementById('objetivo').value
        };

        // Verificación simple antes de enviar
        if(!datos.nombre || !datos.email || !datos.actividad_fisica || !datos.objetivo) {
            alert("Por favor, llena todos los campos correctamente.");
            return;
        }

        fetch(`${URL_API}/registrar`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(datos)
        })
        .then(res => res.json())
        .then(result => {
            if(result.status === "success") {
                alert("✅ ¡Éxito! Perfil creado para: " + result.usuario.nombre);
                document.getElementById('registroForm').reset();
            } else {
                alert("❌ Error: " + result.message);
            }
        })
        .catch(err => alert("Error de conexión con la API"));
    }

    // 3. Cargar historial de lavandas al inicio
    fetch(`${URL_API}/lavandas`)
        .then(res => res.json())
        .then(lavandas => {
            const div = document.getElementById('lista-lavandas');
            if(lavandas.length > 0) {
                div.innerHTML = lavandas.map(l => `
                    <div class="registro-item">
                        <strong>📅 ${new Date(l.fecha).toLocaleDateString()}</strong> - 
                        📏 ${l.altura_cm}cm | 🌿 Estado: ${l.estado_salud} <br>
                        <small>📝 ${l.observaciones}</small>
                    </div>
                `).join('');
            } else {
                div.innerText = "Aún no hay registros en el diario de campo.";
            }
        });
</script>

</body>
</html>
