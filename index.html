<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora | Botánica Elite</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌿</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --deep-field: #132e27; /* Verde mate muy oscuro */
            --dusty-lavender: #83677b;
            --field-cream: #e0e0d5; /* Un crema más apagado/texturizado */
            --white: #ffffff;
        }

        body {
            margin: 0;
            background: var(--field-cream);
            color: #2c3e50;
            font-family: 'Poppins', sans-serif; /* Cambié la fuente a una más moderna y legible */
            overflow-x: hidden;
        }

        /* PORTADA REDISEÑADA: Más Peso y Legibilidad */
        #portada {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(19,46,39,0.9)), 
                        url('https://images.unsplash.com/photo-1591811804257-2e1d09e74bb7?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: all 0.7s ease-out;
        }

        .title-block { 
            animation: fadeInDown 1.2s; 
            background: rgba(0,0,0,0.3); /* Contraste extra para el texto */
            padding: 40px; 
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn-impact {
            padding: 18px 55px;
            background: var(--deep-field);
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 40px;
            border-radius: 50px;
            border: none;
            transition: 0.4s;
            text-transform: uppercase;
            letter-spacing: 3px;
            box-shadow: 0 10px 30px rgba(19,46,39,0.5);
        }

        .btn-impact:hover { 
            background: white; 
            color: var(--deep-field); 
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        /* Contenedor Flotante Orgánico */
        #app { display: none; padding: 60px 20px; max-width: 850px; margin: auto; }

        .card {
            background: var(--white);
            padding: 45px;
            border-radius: 35px; /* Esquinas suaves */
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.08);
            margin-bottom: 40px;
            border: none;
        }

        h2 { color: var(--deep-field); font-weight: 300; font-size: 1.6rem; border-bottom: 1px solid #eee; padding-bottom: 15px; }

        input, select, textarea {
            width: 100%;
            padding: 16px;
            margin: 10px 0 20px 0;
            background: #fcfcfc;
            border: 1px solid #e5e5e5;
            border-radius: 15px; /* Inputs suaves */
            font-size: 1rem;
            color: #4a4a4a;
        }

        input:focus { border-color: var(--dusty-lavender); background: white; }

        .btn-save {
            background: var(--deep-field);
            color: white;
            padding: 18px;
            width: 100%;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }

        .btn-save:hover { filter: brightness(1.15); transform: translateY(-2px); }

        /* Lista de registros estilo "Burbuja" */
        .registro-card {
            background: white;
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            border-left: 5px solid var(--deep-field);
        }

        /* Admin discreto */
        .admin-secret { text-align: center; margin: 100px 0 30px; opacity: 0.15; cursor: default; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="portada">
        <div class="title-block animate__animated animate__fadeInDown">
            <h1 style="font-size: 4rem; font-weight: 100; letter-spacing: 12px; margin: 0; text-transform: uppercase;">Botánica</h1>
            <p style="font-size: 1.3rem; letter-spacing: 4px; color: #a8e6cf; margin: 5px 0 0;">INVESTIGACIÓN DE CAMPO // ELITE SYSTEM</p>
        </div>
        <button class="btn-impact" onclick="iniciar()">EXPLORAR BITÁCORA</button>
    </div>

    <div id="app" class="animate__animated animate__fadeIn">
        <div class="card">
            <h2>Persona a Cargo</h2>
            <input type="text" id="reg_nombre" placeholder="Nombre completo del investigador autorizado">
            <button class="btn-save" onclick="registrar()">DAR DE ALTA</button>
        </div>

        <div class="card">
            <h2>Nuevo Registro de Campo</h2>
            <select id="sel_usuario"><option>Cargando lista...</option></select>
            
            <div style="display: flex; gap: 20px;">
                <input type="number" id="obs_altura" placeholder="Altura (cm)" style="flex: 1;">
                <select id="obs_estado" style="flex: 1;">
                    <option>Saludable</option>
                    <option>En Floración</option>
                    <option>Estrés Hídrico</option>
                </select>
            </div>
            
            <textarea id="obs_notas" rows="4" placeholder="Observaciones detalladas cualitativas..."></textarea>
            <button class="btn-save" style="background: var(--dusty-lavender);" onclick="guardar()">SUBIR A NUBE</button>
        </div>

        <div id="historial"></div>

        <div class="admin-secret" onclick="abrirAdmin()">Sistema v4.0 (Osio)</div>
        <div id="admin-panel" style="display:none;" class="card">
            <h3 style="color:#e63946">Mantenimiento de Datos</h3>
            <div id="lista_admin"></div>
        </div>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    function iniciar() {
        document.getElementById('portada').style.opacity = '0';
        document.getElementById('portada').style.transform = 'translateY(-100vh)';
        
        setTimeout(() => {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            actualizarTodo();
        }, 700);
    }

    // Alertas Profesionales (SweetAlert2)
    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        background: '#132e27',
        color: '#fff'
    });

    async function actualizarTodo() {
        try {
            const [uRes, hRes] = await Promise.all([
                fetch(`${API}/lista-usuarios`),
                fetch(`${API}/lavandas_json`)
            ]);
            
            const usuarios = await uRes.json();
            const historial = await hRes.json();

            const select = document.getElementById('sel_usuario');
            if(usuarios.length > 0) {
                select.innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
                document.getElementById('lista_admin').innerHTML = usuarios.map(u => `
                    <div style="display:flex; justify-content:space-between; padding:10px 0;">
                        <span>${u.nombre}</span>
                        <button onclick="borrarU(${u.id})" style="color:#e63946; background:none; border:none; cursor:pointer;">[Eliminar]</button>
                    </div>
                `).join('');
            }

            document.getElementById('historial').innerHTML = historial.map(l => `
                <div class="registro-card">
                    <div style="display:flex; justify-content:space-between; font-weight:bold; color:var(--deep-field);">
                        <span>👤 ${l.nombre}</span>
                        <span style="opacity:0.4; font-weight:normal;">📅 ${new Date(l.fecha).toLocaleDateString()}</span>
                    </div>
                    <div style="margin: 12px 0;">📏 ${l.altura_cm}cm — ${l.estado_salud}</div>
                    <div style="font-style:italic; opacity:0.8; font-size:0.95rem;">"${l.observaciones}"</div>
                </div>
            `).join('');
        } catch (e) { console.error(e); }
    }

    async function registrar() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return Swal.fire('Error', 'Escriba un nombre válido', 'warning');

        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre })
        });

        document.getElementById('reg_nombre').value = "";
        Toast.fire({ icon: 'success', title: 'Investigador Autorizado' });
        actualizarTodo();
    }

    async function guardar() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };

        if(!payload.notas) return Swal.fire('Error', 'Describe tus observaciones', 'error');

        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        document.getElementById('obs_altura').value = "";
        document.getElementById('obs_notas').value = "";
        Toast.fire({ icon: 'success', title: 'Registro Sincronizado' });
        actualizarTodo();
    }

    function abrirAdmin() {
        Swal.fire({
            title: 'Acceso Restringido',
            input: 'password',
            confirmButtonText: 'Entrar',
            confirmButtonColor: '#132e27'
        }).then((result) => {
            if (result.value === "osio2023") {
                document.getElementById('admin-panel').style.display = 'block';
                window.scrollTo(0,document.body.scrollHeight);
            }
        });
    }

    async function borrarU(id) {
        if((await Swal.fire({ title: '¿Borrar?', icon: 'warning', showCancelButton: true })).isConfirmed) {
            await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' });
            actualizarTodo();
            Toast.fire({ icon: 'success', title: 'Eliminado' });
        }
    }
</script>
</body>
</html>
