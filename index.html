<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitácora de Lavanda</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌿</text></svg>">
    
    <style>
        :root {
            --deep-green: #1a3c34;
            --muted-lavender: #6d597a;
            --cream: #f4f1de;
            --text: #333;
        }

        body {
            margin: 0;
            background: var(--cream);
            color: var(--text);
            font-family: 'Georgia', serif;
            overflow-x: hidden;
        }

        /* Portada Elegante */
        #portada {
            height: 100vh;
            background: linear-gradient(rgba(26,60,52,0.8), rgba(26,60,52,0.9)), 
                        url('https://images.unsplash.com/photo-1596003906949-67221c37965c?auto=format&fit=crop&w=1000&q=80');
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-lujo {
            padding: 18px 50px;
            background: transparent;
            border: 2px solid white;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn-lujo:hover { background: white; color: var(--deep-green); }

        /* Contenedor Principal */
        #app { display: none; padding: 40px 20px; max-width: 800px; margin: auto; animation: fadeUp 1s; }

        .card {
            background: white;
            padding: 40px;
            border-radius: 5px;
            box-shadow: 20px 20px 60px #d9d6c3, -20px -20px 60px #ffffff;
            margin-bottom: 40px;
            border-top: 8px solid var(--deep-green);
        }

        h2 { color: var(--deep-green); text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            margin: 15px 0;
            background: #f9f9f9;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .btn-save {
            background: var(--deep-green);
            color: white;
            padding: 15px;
            width: 100%;
            border: none;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .registro-card {
            background: white;
            border-left: 5px solid var(--muted-lavender);
            padding: 20px;
            margin: 15px 0;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
        }

        /* Animación */
        @keyframes fadeUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        
        .hoja-decor { position: absolute; font-size: 100px; opacity: 0.1; z-index: -1; }
    </style>
</head>
<body>

    <div id="portada">
        <h1 style="font-size: 3.5rem; margin: 0;">SISTEMA SALUD</h1>
        <h2 style="color: white; border: none;">& LAVANDA</h2>
        <button class="btn-lujo" onclick="iniciar()">Entrar a Bitácora</button>
    </div>

    <div id="app">
        <div class="card">
            <h2>Investigador</h2>
            <input type="text" id="reg_nombre" placeholder="Nombre del nuevo investigador">
            <button class="btn-save" onclick="registrar()">ALTA DE USUARIO</button>
        </div>

        <div class="card" style="border-top-color: var(--muted-lavender);">
            <h2>Diario de Campo</h2>
            <select id="sel_usuario"><option>Cargando lista...</option></select>
            <input type="number" id="obs_altura" placeholder="Altura Planta (cm)">
            <select id="obs_estado">
                <option>Saludable</option>
                <option>Necesita Riego</option>
                <option>Floración</option>
            </select>
            <textarea id="obs_notas" placeholder="Escribe aquí tus observaciones..."></textarea>
            <button class="btn-save" style="background: var(--muted-lavender);" onclick="guardar()">SUBIR DATOS</button>
        </div>

        <div id="historial"></div>

        <div style="text-align: center; margin-top: 100px; opacity: 0.1; cursor: pointer;" onclick="abrirAdmin()">Admin</div>
        <div id="admin-panel" style="display:none;" class="card">
            <h3 style="color:red">Borrar Investigadores</h3>
            <div id="lista_admin"></div>
        </div>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    function iniciar() {
        document.getElementById('portada').style.transform = 'translateY(-100vh)';
        setTimeout(() => {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            actualizarTodo();
        }, 600);
    }

    async function actualizarTodo() {
        // Carga investigadores
        const uRes = await fetch(`${API}/lista-usuarios`);
        const usuarios = await uRes.json();
        const select = document.getElementById('sel_usuario');
        const adminDiv = document.getElementById('lista_admin');

        if(usuarios.length > 0) {
            select.innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
            adminDiv.innerHTML = usuarios.map(u => `
                <div style="display:flex; justify-content:space-between; margin:10px 0;">
                    <span>${u.nombre}</span>
                    <button onclick="borrarU(${u.id})" style="color:red; background:none; border:none; cursor:pointer;">Eliminar</button>
                </div>
            `).join('');
        }

        // Carga historial
        const hRes = await fetch(`${API}/lavandas_json`);
        const data = await hRes.json();
        document.getElementById('historial').innerHTML = data.map(l => `
            <div class="registro-card">
                <div style="display:flex; justify-content:space-between; color:var(--deep-green); font-weight:bold;">
                    <span>👤 ${l.nombre}</span>
                    <span>📅 ${new Date(l.fecha).toLocaleDateString()}</span>
                </div>
                <p>📏 ${l.altura_cm}cm — ${l.estado_salud}</p>
                <p style="font-style:italic;">"${l.observaciones}"</p>
            </div>
        `).join('');
    }

    async function registrar() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return alert("Nombre vacío");
        
        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ nombre })
        });
        
        document.getElementById('reg_nombre').value = "";
        alert("Investigador Autorizado");
        await actualizarTodo(); // Forzado de actualización
    }

    async function guardar() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };
        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        alert("Bitácora actualizada");
        actualizarTodo();
    }

    function abrirAdmin() {
        if(prompt("Clave:") === "osio2023") document.getElementById('admin-panel').style.display = 'block';
    }

    async function borrarU(id) {
        if(confirm("¿Eliminar?")) {
            await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' });
            actualizarTodo();
        }
    }
</script>
</body>
</html>
