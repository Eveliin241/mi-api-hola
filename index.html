<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huerto Polinizador | Lavanda</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🌿</text></svg>">
    
    <style>
        :root {
            --sage: #8da399; /* Verde olivo suave */
            --dusty-purple: #9a8c98; /* Morado cenizo */
            --bg: #f4f4f2; /* Fondo hueso */
            --text: #4a4a4a;
        }

        body {
            margin: 0;
            font-family: 'Georgia', serif; /* Un toque más elegante/clásico */
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Portada con transición suave */
        #portada {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, #dce2df, #f4f4f2);
            transition: opacity 0.8s ease-out;
        }

        .btn-entry {
            margin-top: 20px;
            padding: 12px 40px;
            background-color: transparent;
            border: 1px solid var(--sage);
            color: var(--sage);
            border-radius: 2px;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.4s;
        }

        .btn-entry:hover {
            background-color: var(--sage);
            color: white;
        }

        /* App Principal Animada */
        #app {
            display: none;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            animation: fadeIn 1.2s ease-in-out;
        }

        .card {
            background: white;
            padding: 30px;
            margin-bottom: 30px;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-left: 3px solid var(--sage);
        }

        h2 {
            font-weight: normal;
            letter-spacing: 1px;
            color: var(--dusty-purple);
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #e0e0e0;
            background: #fafafa;
            color: var(--text);
            border-radius: 0; /* Estilo más arquitectónico */
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            background-color: var(--dusty-purple);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-action:hover { opacity: 0.8; }

        /* Historial Estilo Diario Viejo */
        .log-entry {
            border-bottom: 1px solid #ddd;
            padding: 20px 0;
            animation: slideIn 0.5s ease-out;
        }

        .log-header { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--sage); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Admin Oculto */
        .admin-secret { text-align: center; margin-top: 100px; opacity: 0.2; cursor: help; font-size: 0.7rem; }
        #admin-panel { display: none; background: #fff; border: 1px dashed var(--dusty-purple); padding: 20px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="portada">
        <h1 style="font-weight: 100; font-size: 2.5rem;">Bitácora de Lavanda</h1>
        <p style="font-style: italic; opacity: 0.6;">Investigación Polinizadora 2026</p>
        <button class="btn-entry" onclick="entrar()">ENTRAR</button>
    </div>

    <div id="app">
        <div class="card">
            <h2>NUEVO INVESTIGADOR</h2>
            <input type="text" id="reg_nombre" placeholder="Nombre y Apellido">
            <button class="btn-action" style="background-color: var(--sage);" onclick="registrar()">DAR DE ALTA</button>
        </div>

        <div class="card">
            <h2>DIARIO DE CAMPO</h2>
            <select id="sel_usuario"><option value="">Cargando lista de investigadores...</option></select>
            <input type="number" id="obs_altura" placeholder="Altura medida (cm)">
            <select id="obs_estado">
                <option>Estado: Saludable</option>
                <option>Estado: Estrés Hídrico</option>
                <option>Estado: Floración</option>
                <option>Estado: Enfermedad</option>
            </select>
            <textarea id="obs_notas" rows="4" placeholder="Observaciones cualitativas de la lavanda..."></textarea>
            <button class="btn-action" onclick="guardar()">SUBIR A BITÁCORA</button>
        </div>

        <h2 style="text-align: center; margin-top: 50px;">HISTORIAL RECIENTE</h2>
        <div id="historial"></div>

        <div class="admin-secret" onclick="abrirAdmin()">Mantenimiento de Sistema</div>
        <div id="admin-panel">
            <h4 style="color: #c62828;">Borrar Investigadores</h4>
            <div id="lista_admin"></div>
        </div>
    </div>

<script>
    const API = 'https://mi-api-hola.onrender.com';

    function entrar() {
        document.getElementById('portada').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('portada').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            cargarDatos();
        }, 800);
    }

    async function cargarDatos() {
        const uRes = await fetch(`${API}/lista-usuarios`);
        const usuarios = await uRes.json();
        
        const select = document.getElementById('sel_usuario');
        const adminDiv = document.getElementById('lista_admin');
        
        if(usuarios.length > 0) {
            select.innerHTML = usuarios.map(u => `<option value="${u.id}">${u.nombre}</option>`).join('');
            adminDiv.innerHTML = usuarios.map(u => `
                <div style="display:flex; justify-content:space-between; padding:5px;">
                    <span>${u.nombre}</span>
                    <button onclick="eliminarU(${u.id})" style="color:red; border:none; background:none; cursor:pointer;">[Eliminar]</button>
                </div>
            `).join('');
        }

        const hRes = await fetch(`${API}/lavandas_json`);
        const historial = await hRes.json();
        document.getElementById('historial').innerHTML = historial.map(h => `
            <div class="log-entry">
                <div class="log-header">
                    <span>${h.nombre.toUpperCase()}</span>
                    <span>${new Date(h.fecha).toLocaleDateString()}</span>
                </div>
                <div style="margin: 10px 0; font-size: 1.1rem;">${h.altura_cm}cm — ${h.estado_salud}</div>
                <div style="font-style: italic; opacity: 0.7;">"${h.observaciones}"</div>
            </div>
        `).join('');
    }

    async function registrar() {
        const nombre = document.getElementById('reg_nombre').value;
        if(!nombre) return alert("Ingrese un nombre");

        await fetch(`${API}/registrar`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({nombre})
        });

        document.getElementById('reg_nombre').value = "";
        
        // El truco para que aparezca: esperar 500ms antes de recargar
        setTimeout(() => {
            cargarDatos();
            alert("Investigador registrado y listo en el Diario.");
        }, 500);
    }

    async function guardar() {
        const payload = {
            usuario_id: document.getElementById('sel_usuario').value,
            altura: document.getElementById('obs_altura').value,
            estado: document.getElementById('obs_estado').value,
            notas: document.getElementById('obs_notas').value
        };

        if(!payload.usuario_id || !payload.notas) return alert("Faltan datos");

        await fetch(`${API}/nueva-observacion`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });

        document.getElementById('obs_altura').value = "";
        document.getElementById('obs_notas').value = "";
        cargarDatos();
        alert("Observación añadida.");
    }

    function abrirAdmin() {
        if(prompt("Clave de Acceso:") === "osio2023") {
            document.getElementById('admin-panel').style.display = 'block';
        }
    }

    async function eliminarU(id) {
        if(confirm("¿Borrar investigador?")) {
            await fetch(`${API}/admin/borrar-usuario/${id}`, { method: 'DELETE' });
            cargarDatos();
        }
    }
</script>
</body>
</html>
